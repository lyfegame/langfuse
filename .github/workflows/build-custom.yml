# Build and push custom Langfuse Docker images to GHCR.
# Triggered on tag push matching our fork's convention (v*-altera.*).
# Images: ghcr.io/lyfegame/langfuse-web and ghcr.io/lyfegame/langfuse-worker.

name: Build Custom Images

on:
  push:
    tags:
      - "v*-altera.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build (e.g. v3.155.0-altera.1)"
        required: true

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      build_sha: ${{ steps.resolve.outputs.build_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve build tag and ref
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-altera\.[0-9]+$ ]]; then
              echo "Invalid tag format: $TAG"
              echo "Expected format: v<major>.<minor>.<patch>-altera.<n>"
              exit 1
            fi

            git fetch --force --tags origin
            if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
              echo "Tag does not exist in repository: $TAG"
              exit 1
            fi

            CHECKOUT_REF="refs/tags/$TAG"
          else
            TAG="${GITHUB_REF_NAME}"
            CHECKOUT_REF="${GITHUB_REF}"
          fi

          BUILD_SHA="$(git rev-parse "$CHECKOUT_REF")"
          echo "Resolved tag=$TAG ref=$CHECKOUT_REF sha=$BUILD_SHA"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$CHECKOUT_REF" >> "$GITHUB_OUTPUT"
          echo "build_sha=$BUILD_SHA" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm turbo db:generate

      - name: Build shared package
        run: pnpm turbo build --filter=@langfuse/shared
        env:
          SKIP_ENV_VALIDATION: true

      - name: Type-check
        run: pnpm turbo typecheck
        env:
          SKIP_ENV_VALIDATION: true

  build-web:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.checkout_ref }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./web/Dockerfile
          push: true
          tags: ghcr.io/lyfegame/langfuse-web:${{ needs.validate.outputs.tag }}
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_BUILD_ID=${{ needs.validate.outputs.build_sha }}

  build-worker:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.checkout_ref }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./worker/Dockerfile
          push: true
          tags: ghcr.io/lyfegame/langfuse-worker:${{ needs.validate.outputs.tag }}
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_BUILD_ID=${{ needs.validate.outputs.build_sha }}
